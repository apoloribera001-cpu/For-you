<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abre com carinho 💌</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🔒 SENHA -->
<div class="lock" id="lock">
  <h2>Digite a senha 💌</h2>
  <input type="password" id="password" placeholder="Senha">
  <button onclick="checkPassword()">Entrar</button>
  <p id="error"></p>
</div>

<!-- 🎵 SOM -->
<audio id="music" loop>
  <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9bce70.mp3" type="audio/mp3">
</audio>

<!-- 🎀 CAPA -->
<div class="cover" id="cover">
  <div class="gift">
    <div class="bow">🎀</div>
    <div class="foto"></div>
    <p>abre com carinho 💌</p>
  </div>
</div>

<!-- 📖 LIVRO -->
<div class="book" id="book">

  <div class="page active">Mary 🦇<br><br>Eu gosto de falar contigo…</div>
  <div class="page">Você alegra meus dias de um jeito leve.</div>
  <div class="page">Mesmo quando some tipo Batman 😅</div>
  <div class="page">Eu fico feliz quando você volta.</div>

  <div class="page destaque">
    o resto das páginas estará em branco...<br><br>
    pra nós escrevermos nossa história juntos 💌
  </div>

  <!-- páginas editáveis -->
  <div class="page edit" contenteditable="true"></div>
  <div class="page edit" contenteditable="true"></div>
  <div class="page edit" contenteditable="true"></div>
  <div class="page edit" contenteditable="true"></div>
  <div class="page edit" contenteditable="true"></div>
  <div class="page edit" contenteditable="true"></div>
  <div class="page edit" contenteditable="true"></div>
  <div class="page edit" contenteditable="true"></div>
  <div class="page edit" contenteditable="true"></div>
  <div class="page edit" contenteditable="true"></div>
  <div class="page edit" contenteditable="true"></div>
  <div class="page edit" contenteditable="true"></div>
  <div class="page edit" contenteditable="true"></div>
  <div class="page edit" contenteditable="true"></div>
  <div class="page edit" contenteditable="true"></div>

  <button id="next">➡️</button>

</div>

<script src="script.js"></script>
</body>
</html>
